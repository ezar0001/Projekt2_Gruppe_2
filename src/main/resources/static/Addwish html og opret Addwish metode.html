<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Min ønskeseddel</title>

    <style>
        * {
          box-sizing: border-box;
          margin: 0;
          padding: 0;
        }

        body {
          font-family: Arial, sans-serif;
          min-height: 100vh;
          display: flex;
          justify-content: center;
          align-items: center;
          background: linear-gradient(135deg, #ff9a9e, #fad0c4);
        }

        .container {
          width: 450px;
          background: white;
          padding: 30px;
          border-radius: 18px;
          box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }

        h1 {
          text-align: center;
          margin-bottom: 25px;
          color: #333;
        }

        .input-row {
          display: flex;
          gap: 10px;
          margin-bottom: 20px;
        }

        input {
          flex: 1;
          padding: 14px;
          border: 1px solid #ddd;
          border-radius: 12px;
          font-size: 16px;
          outline: none;
        }

        button {
          padding: 14px 18px;
          border: none;
          border-radius: 12px;
          background: #ff7a9c;
          color: white;
          font-size: 15px;
          font-weight: bold;
          cursor: pointer;
        }

        button:hover {
          background: #ff4f7a;
          transform: scale(1.05);
        }

        ul {
          padding: 0;
        }

        li {
          list-style: none;
          background: #f8f8f8;
          margin-bottom: 12px;
          padding: 14px;
          border-radius: 12px;
          font-size: 16px;
          box-shadow: 0 2px 6px rgba(0,0,0,0.05);
          display: flex;
          justify-content: space-between;
          align-items: center;
        }

        .btn-group {
          display: flex;
          gap: 8px;
        }

        .edit,
        .delete {
          background: transparent;
          border: none;
          cursor: pointer;
          font-size: 16px;
          padding: 0;
        }

        .delete {
          color: red;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>🎁 Min ønskeseddel</h1>

    <div class="input-row">
        <input type="text" placeholder="Skriv dit ønske...">
        <button>Tilføj ønske</button>
    </div>

    <ul>
        <li>
            PlayStation 5
            <div class="btn-group">
                <button class="edit">✏️</button>
                <button class="delete">✕</button>
            </div>
        </li>

        <li>
            Nye sneakers
            <div class="btn-group">
                <button class="edit">✏️</button>
                <button class="delete">✕</button>
            </div>
        </li>

        <li>
            Parfume
            <div class="btn-group">
                <button class="edit">✏️</button>
                <button class="delete">✕</button>
            </div>
        </li>
    </ul>
</div>

</body>
</html>
