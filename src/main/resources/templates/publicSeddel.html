<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ønskeseddel</title>
    <link rel="stylesheet" th:href="@{/onskeseddel.css}">
</head>
<body>
<div style="text-align:center; padding:30px;">
    <h1 th:text="${seddel.navn}" style="color:#333; margin-bottom:10px;">Navn på seddel</h1>
    <p style="color:#666; font-size:16px;">Gælder til: <span th:text="${seddel.dato}">Dato</span></p>
</div>
<div class="container">
    <div class="square" th:each="onske : ${onskeList}">
        <img th:src="@{/gave.jpg}" alt="Gave" style="width:100%; height:150px; object-fit:contain; margin-bottom:10px;">
        <label>Navn:</label>
        <span th:text="${onske.navn}">Navn</span>
        <label>Pris:</label>
        <span th:text="${onske.pris} + ' kr.'">Pris</span>
        <label>Antal:</label>
        <span th:text="${onske.antal}">Antal</span>
        <label>Link:</label>
        <a th:href="${onske.link}" target="_blank" style="color:#ff8c00; text-decoration:none;">Se produkt</a>
    </div>
</div>
</body>
</html>
