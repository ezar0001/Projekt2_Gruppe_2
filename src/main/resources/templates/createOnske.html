<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nyt Ønske</title>
    <link rel="stylesheet" th:href="@{/onskeseddel.css}">
</head>
<body>
<div class="form-container">
    <h2 style="text-align:center; margin-bottom:20px;">Tilføj nyt ønske</h2>
    <form th:action="@{/savecreateOnske}" method="post">
        <input type="hidden" name="seddelId" th:value="${seddelId}">
        <input type="text" name="navn" placeholder="Navn på ønsket" required>
        <input type="number" name="pris" placeholder="Pris" required>
        <input type="text" name="link" placeholder="Link" required>
        <button type="submit" style="margin-top:15px;">Gem ønske</button>
    </form>
    <div style="text-align:center; margin-top:15px;">
        <a th:href="@{/seddel(id=${seddelId})}" style="color:#ff8c00; text-decoration:none;">Annuller</a>
    </div>
</div>
</body>
</html>
