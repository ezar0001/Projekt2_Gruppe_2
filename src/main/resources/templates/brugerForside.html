<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mine ønskesedler</title>
    <link rel="stylesheet" th:href="@{/style.css}">
</head>
<body>
<nav>
    <a th:href="@{/}">
        <img th:src="@{/Logo.png}" alt="Logo" style="height:40px; vertical-align:middle; margin-right:10px;">Ønskeliste
    </a>
    <a th:href="@{/}">Log ud</a>
</nav>
<div class="user-section">
    <div class="username">Mine ønskesedler</div>
    <a th:href="@{/createSeddel}" class="create-seddel">Opret ny ønskeseddel</a>
</div>
<div class="seddel-container">
    <div class="seddel" th:each="seddel : ${seddelList}">
        <img th:src="@{/gave.jpg}" alt="Gave" style="width:100%; height:120px; object-fit:cover; border-radius:8px; margin-bottom:10px;">
        <div class="seddel-name" th:text="${seddel.navn}">Navn</div>
        <div class="seddel-id" th:text="'Dato: ' + ${seddel.dato}">Dato</div>
        <div style="margin-top:10px;">
            <a th:href="@{/seddel(id=${seddel.id})}" class="create-seddel" style="display:inline-block; padding:8px 12px; font-size:12px;">Se ønsker</a>
            <a th:href="@{'/deleteSeddel/'+${seddel.id}}" class="create-seddel" style="display:inline-block; padding:8px 12px; font-size:12px; background:#ff4444;">Slet</a>
        </div>
        <div style="margin-top:15px">
            <span style="font-size:12px; color:#555; display:block; margin-bottom:5px;">Del link:</span>
            <input type="text" readonly th:value="'https://app-wishlist-bf025343.azurewebsites.net/share?id=' + ${seddel.id}" style="width:100%; padding:5px; font-size:10px; border:1px solid #ddd; border-radius:4px; text-align:center;">
        </div>
    </div>
</div>
</body>
</html>
