<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MainPage</title>
    <link rel="stylesheet" th:href="@{onskeseddel.css}">
</head>
<body>
<div class="container">
    <div class="square" th:each="onske : ${onskeList}">
        <img th:src="@{gave.jpg}" alt="Car Image" />
        <div>
            <label>ID:</label>
            <span th:text="${onske.id}">ID</span>
        </div>
        <div>
            <label>Navn:</label>
            <span th:text="${onske.navn}">Navn</span>
        </div>
        <div>
            <label>Pris:</label>
            <span th:text="${onske.pris}">Pris</span>
        </div>
        <div>
            <label>Link</label>
            <span th:text="${onske.link}">Link</span>
        </div>
        <div>
            <label>Antal:</label>
            <span th:text="${onske.antal}">Antal</span>
        </div>
    </div>
</div>

</body>
</html>
