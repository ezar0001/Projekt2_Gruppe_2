<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MainPage</title>
    <link rel="stylesheet" th:href="@{onskeseddel.css}">
</head>
<body>
<div class="container">

    <form action="/addWish" method="post" style="margin-bottom:20px;">

        <input type="hidden" name="seddelId" th:value="${param.id}">

        <label for="name">Navn</label>
        <input type="text" id="name" name="navn" placeholder="Navn"><br><br>

        <label for="pris">Pris</label>
        <input type="number" id="pris" name="pris" placeholder="Pris"><br><br>

        <label for="link">Link</label>
        <input type="text" id="link" name="link" placeholder="Link"><br><br>

        <button type="submit"> Tilføj ønske </button>

    </form>


    <div class="square" th:each="onske : ${onskeList}">

        <img th:src="@{gave.jpg}" th:alt="${onske.navn}">

        <p th:text="${onske.navn}"></p>
        <p th:text="${onske.pris}"></p>

        <a th:href="${onske.link}" target="_blank">Se produkt</a>

        <br>

        <a th:href="@{/deleteWish(id=${onske.id}, seddelId=${param.id})}">
            <button>Slet</button>
        </a>

        <a th:href="@{/editWish(id=${onske.id}, seddelId=${param.id})}">
            <button>Rediger</button>
        </a>

    </div>

</div>

</body>
</html>
