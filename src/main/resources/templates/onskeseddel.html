<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ønskeseddel</title>
    <link rel="stylesheet" th:href="@{/onskeseddel.css}">
</head>
<body>
<div style="text-align:center; padding:20px;">
    <a th:href="@{/bruger}" class="btn">Tilbage til oversigt</a>
    <a th:href="@{createOnske(seddelId=${param.id})}" class="btn">Tilføj nyt ønske</a>
</div>
<div class="container">
    <div class="square" th:each="onske : ${onskeList}">
        <img th:src="@{/gave.jpg}" alt="Gave" style="width:100%; height:150px; object-fit:cover; border-radius:8px; margin-bottom:10px;">
        <label>Navn:</label>
        <span th:text="${onske.navn}">Navn</span>
        <label>Pris:</label>
        <span th:text="${onske.pris} + ' kr.'">Pris</span>
        <label>Antal:</label>
        <span th:text="${onske.antal}">Antal</span>
        <label>Link:</label>
        <a th:href="${onske.link}" target="_blank" style="color:#ff8c00; text-decoration:none;">Se produkt</a>
        <div style="margin-top:15px; text-align:center;">
            <a th:href="@{'/deleteOnske/'+${onske.id}(seddelId=${param.id})}" class="btn" style="background:#ff4444; padding:8px 15px;">Slet ønske</a>
        </div>
    </div>
</div>
</body>
</html>
