<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Opret Ønskeseddel</title>
    <link rel="stylesheet" th:href="@{/onskeseddel.css}">
</head>
<body>
<div class="form-container">
    <h2 style="text-align:center; margin-bottom:20px;">Ny ønskeseddel</h2>
    <form th:action="@{/saveCreateSeddel}" method="post">
        <input type="text" name="navn" placeholder="Navn (f.eks. Juleønsker)" required>
        <input type="date" name="dato" required>
        <button type="submit" style="margin-top:15px;">Opret</button>
    </form>
    <div style="text-align:center; margin-top:15px;">
        <a th:href="@{/bruger}" style="color:#ff8c00; text-decoration:none;">Annuller</a>
    </div>
</div>
</body>
</html>
