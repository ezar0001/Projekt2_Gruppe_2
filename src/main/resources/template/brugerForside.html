<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 40px 20px;
            background-color: #333;
            color: white;
        }

        .nav img {
            height: 40px;
        }

        .nav a {
            color: white;
            text-decoration: none;
            font-weight: bold;
        }


        .user-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
        }

        .user-section img {
            height: 60px;
        }

        .username {
            font-size: 20px;
            font-weight: bold;
        }


        .seddel {
            width: 200px;
            margin: 20px;
            padding: 10px;
            border: 1px solid #ccc;
            text-align: center;
            border-radius: 8px;
        }

        .seddel img {
            width: 100%;
            border-radius: 5px;
        }

        .seddel-name {
            margin-top: 10px;
            font-size: 16px;
        }
    </style>
</head>


<body>


<nav>
    <img src="gave.jpg" alt="Logo">
    <a href="#">Log out</a>
</nav>


<div class="user-section">
    <img src="gave.jpg" alt="Logo">
    <div class="username">John Doe</div>
</div>


<div class="seddel">
    <a href="Ønskeseddel.html"><img src="image.jpg" alt="Item Image"></a>
    <div class="box-name">Item Name</div>
</div>

</body>
</html>
